    <style>
      /* Magazine Page Turn transition and general editorial helpers */
      body {
        background-color: #FAF8F5 !important;
        background-image: 
          /* Broadsheet vertical column grid lines */
          linear-gradient(to right, rgba(128, 0, 0, 0.012) 1px, transparent 1px),
          /* Horizontal notebook ruled lines */
          linear-gradient(to bottom, rgba(0, 0, 0, 0.008) 1px, transparent 1px),
          /* Fine print noise / paper dot texture */
          radial-gradient(rgba(0, 0, 0, 0.025) 0.5px, transparent 0.5px);
        background-size: 120px 100%, 100% 32px, 16px 16px;
        color: #000000 !important;
        font-family: "Lato", sans-serif;
        line-height: 1.7;
      }
      .font-editorial-serif {
        font-family: "Playfair Display", serif;
      }
      .font-editorial-sans {
        font-family: "Lato", sans-serif;
      }
      /* Page-turn animations */
      .page-turn-enter {
        transform: rotateY(-15deg);
        transform-origin: left center;
        opacity: 0;
      }
      .page-turn-active {
        transform: rotateY(0deg);
        opacity: 1;
        transition: all 0.5s ease-in-out;
      }
    </style>
